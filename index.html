<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bastion Eye v11.0 — Sentinel Terminal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Верхний ASCII-динозавр */
    .ascii-header {
      background: #000;
      border-bottom: 1px solid #003366;
      padding: 0.3rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .ascii-art {
      font-size: 0.35rem;
      line-height: 1.2;
      color: #00ff00;
      text-shadow: 0 0 5px #00ff00;
      white-space: pre;
      text-align: center;
      animation: flicker 5s infinite alternate;
    }
    @keyframes flicker {
      0% { opacity: 0.95; }
      100% { opacity: 1; }
    }
    /* Панель управления */
    .cockpit {
      background: #000;
      border-bottom: 1px solid #003366;
      padding: 0.6rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      z-index: 10;
    }
    .cockpit label {
      color: #888;
      font-size: 0.7rem;
      margin-right: -0.3rem;
    }
    .cockpit input[type="number"] {
      background: #0a0a0a;
      color: #00ff00;
      border: 1px solid #003366;
      padding: 0.3rem;
      font-size: 0.8rem;
      text-align: center;
      border-radius: 0.3rem;
      width: 70px;
    }
    .cockpit button {
      background: #0a0a0a;
      color: #ccc;
      border: 1px solid #003366;
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 0.3rem;
      transition: 0.2s;
      white-space: nowrap;
      font-weight: bold;
    }
    .cockpit button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #startBtn { border-color: #00ff00; color: #00ff00; }
    #stopBtn { border-color: #ffff00; color: #ffff00; }
    #testAlarmBtn { border-color: #ff0000; color: #ff0000; }
    #journalBtn { border-color: #00aaff; color: #00aaff; }
    #copyBtn { border-color: #ffaa00; color: #ffaa00; }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #aaa;
    }
    .filter-group input[type="checkbox"] { width: auto; margin: 0; }
    /* Основной дэшборд */
    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
      overflow-y: auto;
    }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #bigPrice {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }
    .level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .level-card {
      background: #0a0a0a;
      border: 1px solid #003366;
      border-radius: 0.4rem;
      padding: 0.4rem;
      text-align: center;
      font-size: 0.7rem;
    }
    .level-card .label { color: #888; }
    .level-card .value { color: #00ff00; font-weight: bold; }
    .indicators-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.5rem;
    }
    .indicator-card {
      background: #0a0a0a;
      border: 1px solid #003366;
      border-radius: 0.4rem;
      padding: 0.5rem;
      text-align: center;
    }
    .indicator-title { font-size: 0.6rem; color: #888; text-transform: uppercase; }
    .indicator-value { font-size: 1rem; font-weight: bold; color: #00ff00; }
    .status-bar {
      background: #000;
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      border-top: 1px solid #003366;
    }
    #alarmIndicator {
      color: #ff0000;
      font-weight: bold;
      animation: blink 0.5s infinite;
      display: none;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #statusText { color: #888; }
    /* Журнал сделок */
    #journalPanel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: #000;
      border-top: 1px solid #003366;
    }
    #journalPanel.active { display: block; }
    .journal-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.7rem;
      color: #ccc;
    }
    .journal-table th {
      text-align: left;
      padding: 0.4rem;
      border-bottom: 1px solid #003366;
      color: #00ff00;
    }
    .journal-table td {
      padding: 0.4rem;
      border-bottom: 1px solid #001a1a;
    }
    .profit { color: #00ff00; }
    .loss { color: #ff0000; }
    /* Демо-панель и позиция */
    .position-bar {
      background: #0a0a0a;
      border: 1px solid #003366;
      border-radius: 0.4rem;
      padding: 0.4rem 0.8rem;
      display: none;
      align-items: center;
      gap: 1rem;
      font-size: 0.7rem;
    }
    .position-bar.active { display: flex; }
    .pos-badge { font-weight: bold; padding: 0.1rem 0.4rem; border-radius: 0.2rem; }
    .pos-badge.long { background: #1a2a1a; color: #00ff00; border: 1px solid #00ff00; }
    .pos-badge.short { background: #2a1a1a; color: #ff0000; border: 1px solid #ff0000; }
    .balance-panel {
      background: #0a0a0a;
      border: 1px solid #003366;
      border-radius: 0.4rem;
      padding: 0.4rem 0.8rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
    }
    #closePosBtn {
      background: #aa0000;
      color: #fff;
      border: 1px solid #ff0000;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      border-radius: 0.3rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="ascii-header">
    <pre class="ascii-art">
