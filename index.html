<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bastion Eye v3.1 — Интерактивный Захват</title>
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #e0e0e0;
        }
        
        .cockpit {
            background: #111;
            border-bottom: 2px solid #333;
            padding: 0.8rem 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            z-index: 10;
        }
        
        .cockpit label {
            color: #888;
            font-size: 0.8rem;
            margin-right: -0.5rem;
        }
        
        .cockpit input {
            background: #1a1a1a;
            color: #00ff00;
            border: 1px solid #555;
            padding: 0.4rem;
            font-size: 0.9rem;
            text-align: center;
            border-radius: 0.4rem;
            width: 100px;
        }
        
        .cockpit button {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #555;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 0.4rem;
            transition: 0.2s;
            white-space: nowrap;
            font-weight: bold;
        }
        .cockpit button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #startBtn { border-color: #00ff00; color: #00ff00; }
        #captureBtn { border-color: #00aaff; color: #00aaff; }
        #stopBtn { border-color: #ffff00; color: #ffff00; }
        #testAlarmBtn { border-color: #ff0000; color: #ff0000; }
        #testBreakoutBtn { border-color: #ff5500; color: #ff5500; }
        
        .chart-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid #333;
        }
        
        .status-bar {
            background: #111;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            border-top: 2px solid #333;
            flex-wrap: wrap;
        }
        
        #priceDisplay {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #alarmIndicator {
            color: #ff0000;
            font-weight: bold;
            animation: blink 0.5s infinite;
            display: none;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        #statusText {
            color: #888;
        }
        
        @media (max-width: 600px) {
            .cockpit button {
                padding: 0.4rem 0.6rem;
                font-size: 0.7rem;
            }
            .cockpit input {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="cockpit">
        <label for="levelInput">УРОВЕНЬ:</label>
        <input type="number" id="levelInput" placeholder="66500">
        <button id="captureBtn" disabled>ЗАХВАТИТЬ С ГРАФИКА</button>
        <button id="startBtn" disabled>ВЗЯТЬ ПОД ОХРАНУ</button>
        <button id="stopBtn" disabled>СТОП</button>
        <button id="testAlarmBtn" disabled>ТЕСТ ЗВУКА</button>
        <button id="testBreakoutBtn" disabled>ТЕСТ ПРОБОЯ</button>
    </div>

    <div class="chart-container">
        <div class="tradingview-widget-container" style="height:100%; width:100%">
            <div id="tradingview_chart" style="height:100%; width:100%"></div>
        </div>
    </div>

    <div class="status-bar">
        <div>
            <span style="color:#888;">BTC/USDT:</span>
            <span id="priceDisplay">ЗАГРУЗКА...</span>
        </div>
        <div id="alarmIndicator">ЛОЖНЫЙ ПРОБОЙ!</div>
        <div id="statusText">Жду команды...</div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <script>
        // ========== ЭЛЕМЕНТЫ ==========
        const priceDisplay = document.getElementById('priceDisplay');
        const statusText = document.getElementById('statusText');
        const captureBtn = document.getElementById('captureBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const testAlarmBtn = document.getElementById('testAlarmBtn');
        const testBreakoutBtn = document.getElementById('testBreakoutBtn');
        const levelInput = document.getElementById('levelInput');
        const alarmIndicator = document.getElementById('alarmIndicator');

        const API_URL = 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';
        let targetLevel = 0;
        let isMonitoring = false;
        let priceWasAboveLevel = false;
        let tvWidget = null; // Ссылка на виджет

        // ========== ЗВУК ==========
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlarmSound() {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.linearRampToValueAtTime(1100, now + 0.5);
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
            osc.start(now); osc.stop(now + 1);
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(400, now);
            osc2.type = 'square';
            gain2.gain.setValueAtTime(0.4, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc2.start(now); osc2.stop(now + 0.3);
        }

        function alarm() {
            alarmIndicator.style.display = 'block';
            statusText.textContent = 'СИРЕНА! Ложный пробой!';
            statusText.style.color = '#ff0000';
            playAlarmSound();
            if (window.alarmInterval) clearInterval(window.alarmInterval);
            window.alarmInterval = setInterval(playAlarmSound, 2000);
            stopBtn.disabled = false;
        }

        function stopAlarm() {
            alarmIndicator.style.display = 'none';
            if (window.alarmInterval) { clearInterval(window.alarmInterval); window.alarmInterval = null; }
            statusText.textContent = 'Мониторинг остановлен.';
            statusText.style.color = '#888';
            isMonitoring = false; priceWasAboveLevel = false;
            startBtn.disabled = false; stopBtn.disabled = true;
        }

        async function fetchPrice() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const price = parseFloat(data.price);
                priceDisplay.textContent = `$ ${price.toFixed(2)}`;
                startBtn.disabled = false; captureBtn.disabled = false;
                testAlarmBtn.disabled = false; testBreakoutBtn.disabled = false;
                if (isMonitoring && targetLevel > 0) {
                    if (price > targetLevel) { priceWasAboveLevel = true; statusText.textContent = `Уровень ${targetLevel}. Жду возврата...`; statusText.style.color = '#ffff00'; }
                    if (priceWasAboveLevel && price < targetLevel) { statusText.textContent = `ПРОБОЙ!`; statusText.style.color = '#ff0000'; alarm(); isMonitoring = false; startBtn.disabled = false; }
                }
            } catch (e) {
                priceDisplay.textContent = 'ОШИБКА'; startBtn.disabled = true; captureBtn.disabled = true; testAlarmBtn.disabled = true; testBreakoutBtn.disabled = true;
            }
        }
        setInterval(fetchPrice, 1000); fetchPrice();

        // ========== КНОПКИ ==========
        startBtn.addEventListener('click', () => {
            const level = parseFloat(levelInput.value);
            if (!level || level <= 0) { alert('Введи уровень!'); return; }
            targetLevel = level; isMonitoring = true; priceWasAboveLevel = false;
            startBtn.disabled = true; stopBtn.disabled = false;
            statusText.textContent = `Охраняю ${targetLevel}...`; statusText.style.color = '#ffff00';
            stopAlarm();
        });
        stopBtn.addEventListener('click', stopAlarm);
        testAlarmBtn.addEventListener('click', () => { alarm(); statusText.textContent = 'Тест сирены!'; });
        testBreakoutBtn.addEventListener('click', () => {
            alarmIndicator.style.display = 'block'; statusText.textContent = 'ТЕСТ ПРОБОЯ!'; statusText.style.color = '#ff5500'; playAlarmSound();
            setTimeout(() => { alarmIndicator.style.display = 'none'; if (window.alarmInterval) { clearInterval(window.alarmInterval); } statusText.textContent = 'Готов.'; statusText.style.color = '#888'; stopBtn.disabled = true; }, 3000);
        });

        // ========== ИНТЕРАКТИВНЫЙ ЗАХВАТ ==========
        captureBtn.addEventListener('click', () => {
            if (!tvWidget) { alert('График ещё не загрузился. Подожди пару секунд.'); return; }
            // Запрашиваем у виджета все нарисованные линии
            tvWidget.getLines((lines) => {
                if (!lines || lines.length === 0) {
                    alert('Ты ещё не нарисовал ни одной горизонтальной линии на графике!');
                    return;
                }
                // Берём последнюю нарисованную линию
                const lastLine = lines[lines.length - 1];
                const price = lastLine.price;
                if (price) {
                    levelInput.value = price.toFixed(2);
                    statusText.textContent = `Захвачен уровень ${price.toFixed(2)}`;
                    statusText.style.color = '#00aaff';
                } else {
                    alert('Не удалось считать цену с линии. Нарисуй её заново.');
                }
            });
        });

        // ========== ГРАФИК ==========
        tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "toolbar_bg": "#1a1a1a",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "studies": ["MASimple@tv-basicstudies"],
            "container_id": "tradingview_chart"
        });
    </script>
</body>
</html>
