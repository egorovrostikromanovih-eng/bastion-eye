<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bastion Eye v3.0 — Тактический Дисплей</title>
    <style>
        body {
            background: #0a0a0a;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #e0e0e0;
        }
        
        /* Верхняя панель управления — твой штурвал */
        .cockpit {
            background: #111;
            border-bottom: 2px solid #333;
            padding: 0.8rem 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            z-index: 10;
        }
        
        .cockpit label {
            color: #888;
            font-size: 0.8rem;
            margin-right: -0.5rem;
        }
        
        .cockpit input {
            background: #1a1a1a;
            color: #00ff00;
            border: 1px solid #555;
            padding: 0.4rem;
            font-size: 0.9rem;
            text-align: center;
            border-radius: 0.4rem;
            width: 100px;
        }
        
        .cockpit button {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #555;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 0.4rem;
            transition: 0.2s;
            white-space: nowrap;
            font-weight: bold;
        }
        .cockpit button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #startBtn { border-color: #00ff00; color: #00ff00; }
        #stopBtn { border-color: #ffff00; color: #ffff00; }
        #testAlarmBtn { border-color: #ff0000; color: #ff0000; }
        #testBreakoutBtn { border-color: #ff5500; color: #ff5500; }
        
        /* Контейнер графика — твой тактический стол */
        .chart-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid #333;
        }
        
        /* Нижняя статус-панель — твой телеграф */
        .status-bar {
            background: #111;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            border-top: 2px solid #333;
            flex-wrap: wrap;
        }
        
        #priceDisplay {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #alarmIndicator {
            color: #ff0000;
            font-weight: bold;
            animation: blink 0.5s infinite;
            display: none;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        #statusText {
            color: #888;
        }
        
        /* Адаптив для мобильных */
        @media (max-width: 600px) {
            .cockpit button {
                padding: 0.4rem 0.6rem;
                font-size: 0.7rem;
            }
            .cockpit input {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="cockpit">
        <label for="levelInput">УРОВЕНЬ:</label>
        <input type="number" id="levelInput" placeholder="66500">
        <button id="startBtn" disabled>ВЗЯТЬ ПОД ОХРАНУ</button>
        <button id="stopBtn" disabled>СТОП</button>
        <button id="testAlarmBtn" disabled>ТЕСТ ЗВУКА</button>
        <button id="testBreakoutBtn" disabled>ТЕСТ ПРОБОЯ</button>
    </div>

    <div class="chart-container">
        <!-- TradingView Widget — встраивается прямо сюда -->
        <div class="tradingview-widget-container" style="height:100%; width:100%">
            <div id="tradingview_chart" style="height:100%; width:100%"></div>
        </div>
    </div>

    <div class="status-bar">
        <div>
            <span style="color:#888;">BTC/USDT:</span>
            <span id="priceDisplay">ЗАГРУЗКА...</span>
        </div>
        <div id="alarmIndicator">ЛОЖНЫЙ ПРОБОЙ!</div>
        <div id="statusText">Жду команды...</div>
    </div>

    <!-- Скрипт TradingView -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <script>
        // ========== 1. ЭЛЕМЕНТЫ УПРАВЛЕНИЯ ==========
        const priceDisplay = document.getElementById('priceDisplay');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const testAlarmBtn = document.getElementById('testAlarmBtn');
        const testBreakoutBtn = document.getElementById('testBreakoutBtn');
        const levelInput = document.getElementById('levelInput');
        const alarmIndicator = document.getElementById('alarmIndicator');

        // ========== 2. ПЕРЕМЕННЫЕ ==========
        const API_URL = 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';
        let targetLevel = 0;
        let isMonitoring = false;
        let priceWasAboveLevel = false;

        // ========== 3. СИНТЕЗ ЗВУКА (ГРОМКИЙ РЕЗКИЙ АЛЕРТ) ==========
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlarmSound() {
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.linearRampToValueAtTime(1100, now + 0.5);
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
            osc.start(now);
            osc.stop(now + 1);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(400, now);
            osc2.type = 'square';
            gain2.gain.setValueAtTime(0.4, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc2.start(now);
            osc2.stop(now + 0.3);
        }

        // ========== 4. ЛОГИКА АЛЕРТА ==========
        function alarm() {
            alarmIndicator.style.display = 'block';
            statusText.textContent = 'СИРЕНА! Ложный пробой!';
            statusText.style.color = '#ff0000';
            playAlarmSound();
            if (window.alarmInterval) clearInterval(window.alarmInterval);
            window.alarmInterval = setInterval(playAlarmSound, 2000);
            stopBtn.disabled = false;
        }

        function stopAlarm() {
            alarmIndicator.style.display = 'none';
            if (window.alarmInterval) {
                clearInterval(window.alarmInterval);
                window.alarmInterval = null;
            }
            statusText.textContent = 'Мониторинг остановлен.';
            statusText.style.color = '#888';
            isMonitoring = false;
            priceWasAboveLevel = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // ========== 5. ПОЛУЧЕНИЕ ЦЕНЫ И МОНИТОРИНГ ==========
        async function fetchPrice() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const price = parseFloat(data.price);
                priceDisplay.textContent = `$ ${price.toFixed(2)}`;
                
                // Активируем кнопки, когда API ожил
                startBtn.disabled = false;
                testAlarmBtn.disabled = false;
                testBreakoutBtn.disabled = false;

                if (isMonitoring && targetLevel > 0) {
                    if (price > targetLevel) {
                        priceWasAboveLevel = true;
                        statusText.textContent = `Уровень ${targetLevel}. Цена над ним. Жду возврата...`;
                        statusText.style.color = '#ffff00';
                    }
                    if (priceWasAboveLevel && price < targetLevel) {
                        statusText.textContent = `ПРОБОЙ! Цена ушла под ${targetLevel}!`;
                        statusText.style.color = '#ff0000';
                        alarm();
                        isMonitoring = false;
                        startBtn.disabled = false;
                    }
                }
            } catch (error) {
                priceDisplay.textContent = 'ОШИБКА';
                startBtn.disabled = true;
                testAlarmBtn.disabled = true;
                testBreakoutBtn.disabled = true;
            }
        }

        setInterval(fetchPrice, 1000);
        fetchPrice();

        // ========== 6. КНОПКИ УПРАВЛЕНИЯ ==========
        startBtn.addEventListener('click', () => {
            const level = parseFloat(levelInput.value);
            if (!level || level <= 0) {
                alert('Введи корректный уровень цены!');
                return;
            }
            targetLevel = level;
            isMonitoring = true;
            priceWasAboveLevel = false;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.textContent = `Охраняю уровень ${targetLevel}. Жду касания и возврата...`;
            statusText.style.color = '#ffff00';
            stopAlarm();
        });

        stopBtn.addEventListener('click', stopAlarm);
        
        testAlarmBtn.addEventListener('click', () => {
            alarm();
            statusText.textContent = 'Ручной тест сирены! Нажми СТОП чтобы выключить.';
        });

        testBreakoutBtn.addEventListener('click', () => {
            alarmIndicator.style.display = 'block';
            statusText.textContent = 'ТЕСТ ПРОБОЯ! Симуляция...';
            statusText.style.color = '#ff5500';
            playAlarmSound();
            
            setTimeout(() => {
                alarmIndicator.style.display = 'none';
                if (window.alarmInterval) {
                    clearInterval(window.alarmInterval);
                    window.alarmInterval = null;
                }
                statusText.textContent = 'Тест завершен. Система готова.';
                statusText.style.color = '#888';
                stopBtn.disabled = true;
            }, 3000);
        });

        // ========== 7. ГРАФИК TRADINGVIEW (СВЕЧНОЙ) ==========
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "toolbar_bg": "#1a1a1a",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "studies": [
                "MASimple@tv-basicstudies"
            ],
            "container_id": "tradingview_chart"
        });
    </script>
</body>
</html>
