<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bastion Eye v2.3 — Связка Стоп</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a1a1a;
            border: 2px solid #333;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.1);
            max-width: 90%;
        }
        #price {
            font-size: 3rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            margin: 1rem 0;
        }
        .status {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #888;
        }
        input {
            background: #222;
            color: #00ff00;
            border: 1px solid #555;
            padding: 0.5rem;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 0.5rem;
            width: 80%;
            margin: 0.5rem 0;
        }
        button {
            background: #222;
            color: #ccc;
            border: 1px solid #555;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.5rem;
            border-radius: 0.5rem;
            transition: 0.2s;
        }
        button:hover {
            background: #333;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #startBtn {
            border-color: #00ff00;
            color: #00ff00;
        }
        #startBtn:hover:not(:disabled) {
            border-color: #00ff00;
            color: #00ff00;
            background: #333;
        }
        #stopBtn {
            border-color: #ffff00;
            color: #ffff00;
        }
        #stopBtn:hover:not(:disabled) {
            border-color: #ffff00;
            color: #ffff00;
            background: #333;
        }
        #testAlarmBtn {
            border-color: #ff0000;
            color: #ff0000;
            font-weight: bold;
        }
        #testAlarmBtn:hover:not(:disabled) {
            border-color: #ff0000;
            color: #ff0000;
            background: #333;
        }
        #testBreakoutBtn {
            border-color: #ff5500;
            color: #ff5500;
            font-weight: bold;
        }
        #testBreakoutBtn:hover:not(:disabled) {
            border-color: #ff5500;
            color: #ff5500;
            background: #333;
        }
        #alarmIndicator {
            display: none;
            color: #ff0000;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1rem;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BASTION EYE v2.3</h1>
        <div id="price">ЗАГРУЗКА...</div>
        <div class="status" id="status">Жду команды...</div>
        
        <input type="number" id="levelInput" placeholder="Введи уровень (напр. 66500)">
        
        <button id="startBtn" disabled>ВЗЯТЬ ПОД ОХРАНУ</button>
        <button id="stopBtn" disabled>СТОП</button>
        <button id="testAlarmBtn" disabled>ТЕСТ СИРЕНЫ</button>
        <button id="testBreakoutBtn" disabled>ТЕСТ ПРОБОЯ</button>
        
        <div id="alarmIndicator">ЛОЖНЫЙ ПРОБОЙ! ЦЕНА УШЛА ПОД УРОВЕНЬ!</div>
    </div>

    <script>
        const priceElement = document.getElementById('price');
        const statusElement = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const testAlarmBtn = document.getElementById('testAlarmBtn');
        const testBreakoutBtn = document.getElementById('testBreakoutBtn');
        const levelInput = document.getElementById('levelInput');
        const alarmIndicator = document.getElementById('alarmIndicator');

        const API_URL = 'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT';
        
        let targetLevel = 0;
        let isMonitoring = false;
        let priceWasAboveLevel = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlarmSound() {
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.linearRampToValueAtTime(1100, now + 0.5);
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
            osc.start(now);
            osc.stop(now + 1);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(400, now);
            osc2.type = 'square';
            gain2.gain.setValueAtTime(0.4, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc2.start(now);
            osc2.stop(now + 0.3);
        }

        function alarm() {
            alarmIndicator.style.display = 'block';
            statusElement.textContent = 'СИРЕНА! Ложный пробой!';
            statusElement.style.color = '#ff0000';
            playAlarmSound();
            if (window.alarmInterval) clearInterval(window.alarmInterval);
            window.alarmInterval = setInterval(playAlarmSound, 2000);
            // Включаем кнопку СТОП
            stopBtn.disabled = false;
        }

        function stopAlarm() {
            alarmIndicator.style.display = 'none';
            if (window.alarmInterval) {
                clearInterval(window.alarmInterval);
                window.alarmInterval = null;
            }
            statusElement.textContent = 'Мониторинг остановлен.';
            statusElement.style.color = '#888';
            isMonitoring = false;
            priceWasAboveLevel = false;
            startBtn.disabled = false;
            stopBtn.disabled = true; // Стоп снова неактивна
        }

        async function fetchPrice() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const price = parseFloat(data.price);
                priceElement.textContent = `$ ${price.toFixed(2)}`;
                statusElement.textContent = 'Канал связи: АКТИВЕН';
                statusElement.style.color = '#00ff00';
                startBtn.disabled = false;
                testAlarmBtn.disabled = false;
                testBreakoutBtn.disabled = false;

                if (isMonitoring && targetLevel > 0) {
                    if (price > targetLevel) {
                        priceWasAboveLevel = true;
                        statusElement.textContent = `Охраняю уровень ${targetLevel}. Цена над ним. Жду возврата...`;
                        statusElement.style.color = '#ffff00';
                    }
                    if (priceWasAboveLevel && price < targetLevel) {
                        statusElement.textContent = `ПРОБОЙ! Цена ушла под ${targetLevel}!`;
                        statusElement.style.color = '#ff0000';
                        alarm();
                        isMonitoring = false;
                        startBtn.disabled = false;
                    }
                }
            } catch (error) {
                priceElement.textContent = '---.--';
                statusElement.textContent = 'Канал связи: ОШИБКА';
                statusElement.style.color = '#ff0000';
                startBtn.disabled = true;
                testAlarmBtn.disabled = true;
                testBreakoutBtn.disabled = true;
            }
        }

        setInterval(fetchPrice, 1000);
        fetchPrice();

        startBtn.addEventListener('click', () => {
            const level = parseFloat(levelInput.value);
            if (!level || level <= 0) {
                alert('Введи корректный уровень цены!');
                return;
            }
            targetLevel = level;
            isMonitoring = true;
            priceWasAboveLevel = false;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusElement.textContent = `Охраняю уровень ${targetLevel}. Жду, когда цена будет выше и упадёт...`;
            statusElement.style.color = '#ffff00';
            stopAlarm(); // на случай, если была тестовая сирена
        });

        stopBtn.addEventListener('click', () => {
            stopAlarm();
        });
        
        testAlarmBtn.addEventListener('click', () => {
            alarm();
            statusElement.textContent = 'Ручной тест сирены! Нажми СТОП чтобы выключить.';
            // Кнопка СТОП уже активна из alarm()
        });

        testBreakoutBtn.addEventListener('click', () => {
            alarmIndicator.style.display = 'block';
            statusElement.textContent = 'ТЕСТ ПРОБОЯ! Симулирую касание и возврат...';
            statusElement.style.color = '#ff5500';
            playAlarmSound();
            // Кнопка СТОП активна из alarm()
            
            setTimeout(() => {
                alarmIndicator.style.display = 'none';
                if (window.alarmInterval) {
                    clearInterval(window.alarmInterval);
                    window.alarmInterval = null;
                }
                statusElement.textContent = 'Тест завершен. Система готова.';
                statusElement.style.color = '#888';
                stopBtn.disabled = true; // Через 3 сек кнопка Стоп снова неактивна
            }, 3000);
        });
    </script>
</body>
</html>
